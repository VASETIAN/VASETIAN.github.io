<script>
/**
 * V6: 自然主义渲染 (Naturalism & Composition Fix)
 * 修正：相机视角拉远，增加叶片颜色随机性，优化树冠形态分布。
 */
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('canvas-container');
    
    // 1. 场景
    const scene = new THREE.Scene();
    // 雾气颜色与背景底色一致，制造地平线消失感
    scene.fog = new THREE.Fog(0xeefcfc, 60, 300);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    // 【关键修正】相机拉远 (z=140)，抬高 (y=40)，确保树冠完整
    camera.position.set(0, 40, 140); 
    // 看向树冠中心偏上位置 (y=30)，而不是树根
    camera.lookAt(0, 30, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // 电影感色调
    renderer.toneMappingExposure = 1.05;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.2;
    controls.maxPolarAngle = Math.PI / 2 - 0.02; // 禁止看地下
    controls.minDistance = 50;
    controls.maxDistance = 200;

    // 2. 光照 (模拟上午10点的阳光)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x555555, 1.2); 
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xfff5e6, 2.8); // 暖白光
    dirLight.position.set(80, 150, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 4096;
    dirLight.shadow.mapSize.height = 4096;
    // 阴影范围必须足够大，否则树冠顶部阴影会被切断
    const d = 100;
    dirLight.shadow.camera.left = -d;
    dirLight.shadow.camera.right = d;
    dirLight.shadow.camera.top = d;
    dirLight.shadow.camera.bottom = -d;
    dirLight.shadow.bias = -0.0001;
    scene.add(dirLight);

    // 3. 纹理生成
    function createLeafTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        
        // 绘制更自然的叶丛形状 (不规则边缘)
        ctx.fillStyle = "#ffffff"; // 用白色绘制，颜色由材质决定
        
        for(let i=0; i<6; i++) {
            const x = 64 + (Math.random()-0.5) * 60;
            const y = 64 + (Math.random()-0.5) * 60;
            const r = 20 + Math.random() * 20;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fill();
        }
        
        const tex = new THREE.CanvasTexture(canvas);
        return tex;
    }

    // 4. 材质
    const barkMat = new THREE.MeshStandardMaterial({ 
        color: 0x5D4037, roughness: 1.0 
    });

    const leafMap = createLeafTexture();
    const leafMat = new THREE.MeshStandardMaterial({ 
        map: leafMap, 
        color: 0xffffff, // 基础色白，通过 InstanceColor 染色
        transparent: true, 
        alphaTest: 0.4, 
        side: THREE.DoubleSide, 
        roughness: 0.8
    });

    // 5. 树生成逻辑
    const treeGroup = new THREE.Group();
    scene.add(treeGroup);
    
    // 存储叶子变换矩阵和颜色
    const leavesData = []; 

    // 生成叶子团簇 (Cloud)
    // centerPos: 团簇中心, count: 叶子数量, scale: 整体大小
    function generateLeafCloud(centerPos, count, scaleMultiplier) {
        for(let i=0; i<count; i++) {
            // 球形随机分布
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = 3.5 * Math.cbrt(Math.random()); 

            const x = centerPos.x + r * Math.sin(phi) * Math.cos(theta);
            const y = centerPos.y + r * Math.sin(phi) * Math.sin(theta) * 0.6; // 压扁一点
            const z = centerPos.z + r * Math.cos(phi);

            const pos = new THREE.Vector3(x, y, z);
            
            // 随机旋转
            const rot = new THREE.Euler(
                Math.random() * Math.PI, 
                Math.random() * Math.PI, 
                Math.random() * Math.PI
            );
            
            // 大小不一
            const s = (1.5 + Math.random() * 1.5) * scaleMultiplier;
            const scale = new THREE.Vector3(s, s, s);

            // 【关键】颜色随机化 (Color Variation)
            // 基础色：深绿 (0.1, 0.4, 0.1) 到 嫩绿 (0.4, 0.7, 0.2)
            const rCol = 0.1 + Math.random() * 0.2;
            const gCol = 0.3 + Math.random() * 0.4;
            const bCol = 0.1 + Math.random() * 0.15;
            const color = new THREE.Color(rCol, gCol, bCol);

            leavesData.push({ pos, rot, scale, color });
        }
    }

    // 递归生成树枝
    function growBranch(start, dir, length, radius, depth) {
        const end = new THREE.Vector3().copy(start).add(dir.clone().multiplyScalar(length));
        
        const geometry = new THREE.CylinderGeometry(radius * 0.7, radius, length, 7);
        geometry.translate(0, length / 2, 0);
        
        const branch = new THREE.Mesh(geometry, barkMat);
        branch.position.copy(start);
        branch.lookAt(end);
        branch.rotateX(Math.PI / 2);
        branch.castShadow = true;
        branch.receiveShadow = true;
        treeGroup.add(branch);

        // 在末端生成叶子云团
        // 只有最后 3 层生成叶子，越末端越密集
        if (depth <= 3) {
            const density = (4 - depth) * 15; // 密度递增
            generateLeafCloud(end, density, 1.0);
            
            // 在树枝中间也加一点，填补空隙
            const mid = new THREE.Vector3().lerpVectors(start, end, 0.6);
            generateLeafCloud(mid, density * 0.5, 0.8);
        }

        if (depth <= 0) return;

        // 分叉
        const numBranches = 2;
        for (let i = 0; i < numBranches; i++) {
            const angleX = (Math.random() - 0.5) * 1.5;
            const angleZ = (Math.random() - 0.5) * 1.5;
            // 向上生长力
            const newDir = dir.clone().applyEuler(new THREE.Euler(angleX, 0, angleZ)).normalize().add(new THREE.Vector3(0, 0.6, 0)).normalize();
            
            growBranch(end, newDir, length * 0.75, radius * 0.7, depth - 1);
        }
    }

    // 主干生成 (调整起始高度，避免穿地)
    growBranch(new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), 16, 2.5, 6);

    // 6. 渲染海量叶片 (InstancedMesh + InstanceColor)
    const leafGeometry = new THREE.PlaneGeometry(1, 1);
    const leafMesh = new THREE.InstancedMesh(leafGeometry, leafMat, leavesData.length);
    leafMesh.castShadow = true;
    leafMesh.receiveShadow = true;
    
    const dummy = new THREE.Object3D();
    
    leavesData.forEach((data, index) => {
        dummy.position.copy(data.pos);
        dummy.rotation.copy(data.rot);
        dummy.scale.copy(data.scale);
        dummy.updateMatrix();
        leafMesh.setMatrixAt(index, dummy.matrix);
        leafMesh.setColorAt(index, data.color); // 设置独立颜色
    });
    
    leafMesh.instanceMatrix.needsUpdate = true;
    leafMesh.instanceColor.needsUpdate = true; // 必须开启
    treeGroup.add(leafMesh);

    // 7. 无限草地
    const groundGeo = new THREE.CircleGeometry(300, 64);
    const groundMat = new THREE.MeshStandardMaterial({ 
        color: 0x4a6741, // 柔和的草绿
        roughness: 1.0 
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // 8. 动画
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        
        const time = Date.now() * 0.0005;
        // 树冠微动
        leafMesh.rotation.y = Math.sin(time * 0.3) * 0.02; 
        treeGroup.rotation.z = Math.sin(time * 0.2) * 0.005;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
});
</script>
